<svg width="320" height="80" viewBox="0 0 320 80" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="320" height="80" rx="16" fill="#0a0814"/>

  <!-- Icon mark: central hub with 4 orbiting agent nodes -->
  <!-- Outer ring (subtle) -->
  <circle cx="40" cy="40" r="26" fill="none" stroke="#7c6fff" stroke-width="0.6" opacity="0.25"/>

  <!-- Connector lines from center to outer nodes -->
  <line x1="40" y1="28" x2="40" y2="16" stroke="#7c6fff" stroke-width="1.6" stroke-linecap="round" opacity="0.55"/>
  <line x1="52" y1="46" x2="62" y2="56" stroke="#7c6fff" stroke-width="1.6" stroke-linecap="round" opacity="0.55"/>
  <line x1="28" y1="46" x2="18" y2="56" stroke="#7c6fff" stroke-width="1.6" stroke-linecap="round" opacity="0.55"/>
  <line x1="56" y1="34" x2="64" y2="22" stroke="#7c6fff" stroke-width="1.6" stroke-linecap="round" opacity="0.55"/>

  <!-- Center node (Orchestrator) -->
  <circle cx="40" cy="40" r="11" fill="#7c6fff"/>
  <circle cx="40" cy="40" r="5"  fill="#c4bcff"/>

  <!-- Outer nodes (Agents) — teal -->
  <circle cx="40" cy="13" r="5.5" fill="#00c9a7"/>
  <circle cx="66" cy="59" r="5.5" fill="#00c9a7"/>
  <circle cx="14" cy="59" r="5.5" fill="#00c9a7"/>
  <circle cx="67" cy="19" r="4"   fill="#00c9a7" opacity="0.7"/>

  <!-- Traveling pulse dot on top arm -->
  <circle cx="40" cy="22" r="2.5" fill="#ffffff" opacity="0.9"/>

  <!-- Wordmark -->
  <text x="88" y="33" font-family="Georgia, 'Times New Roman', serif" font-size="28" font-weight="700" fill="#f0eeff" letter-spacing="5">NEXUS</text>

  <!-- Subtitle -->
  <text x="90" y="54" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="400" fill="#8888aa" letter-spacing="3.5">AI  PIPELINE</text>

  <!-- Divider line between icon and text -->
  <line x1="75" y1="18" x2="75" y2="62" stroke="#2a2550" stroke-width="1" stroke-linecap="round"/>
</svg>
