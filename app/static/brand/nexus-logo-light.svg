<svg width="320" height="80" viewBox="0 0 320 80" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="320" height="80" rx="16" fill="#f4f2ff"/>

  <!-- Outer ring -->
  <circle cx="40" cy="40" r="26" fill="none" stroke="#5a50e0" stroke-width="0.6" opacity="0.2"/>

  <!-- Connector lines -->
  <line x1="40" y1="28" x2="40" y2="16" stroke="#5a50e0" stroke-width="1.6" stroke-linecap="round" opacity="0.5"/>
  <line x1="52" y1="46" x2="62" y2="56" stroke="#5a50e0" stroke-width="1.6" stroke-linecap="round" opacity="0.5"/>
  <line x1="28" y1="46" x2="18" y2="56" stroke="#5a50e0" stroke-width="1.6" stroke-linecap="round" opacity="0.5"/>
  <line x1="56" y1="34" x2="64" y2="22" stroke="#5a50e0" stroke-width="1.6" stroke-linecap="round" opacity="0.4"/>

  <!-- Center node -->
  <circle cx="40" cy="40" r="11" fill="#5a50e0"/>
  <circle cx="40" cy="40" r="5"  fill="#a09af0"/>

  <!-- Outer nodes -->
  <circle cx="40" cy="13" r="5.5" fill="#0f8a72"/>
  <circle cx="66" cy="59" r="5.5" fill="#0f8a72"/>
  <circle cx="14" cy="59" r="5.5" fill="#0f8a72"/>
  <circle cx="67" cy="19" r="4"   fill="#0f8a72" opacity="0.65"/>

  <!-- Pulse dot -->
  <circle cx="40" cy="22" r="2.5" fill="#5a50e0" opacity="0.7"/>

  <!-- Divider -->
  <line x1="75" y1="18" x2="75" y2="62" stroke="#c8c0f0" stroke-width="1" stroke-linecap="round"/>

  <!-- Wordmark -->
  <text x="88" y="33" font-family="Georgia, 'Times New Roman', serif" font-size="28" font-weight="700" fill="#1a1540" letter-spacing="5">NEXUS</text>

  <!-- Subtitle -->
  <text x="90" y="54" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="400" fill="#5a50e0" letter-spacing="3.5">AI  PIPELINE</text>
</svg>
