<svg width="600" height="200" viewBox="40 40 600 200" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>NEXUS AI Pipeline animated logo</title>
  <desc>Animated NEXUS AI Pipeline logo with pulsing nodes, moving signal dot, and rotating ring.</desc>

  <defs>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feColorMatrix
        in="blur"
        type="matrix"
        values="0 0 0 0 0.486 0 0 0 0 0.435 0 0 0 0 1 0 0 0 0.55 0"
        result="glow"
      />
      <feMerge>
        <feMergeNode in="glow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <style>
      .ring {
        animation: dash 6s linear infinite;
        transform-box: fill-box;
        transform-origin: center;
      }

      .wordmark {
        animation: wordFade 4.5s ease-in-out infinite;
      }

      @keyframes dash {
        to {
          stroke-dashoffset: -96;
        }
      }

      @keyframes wordFade {
        0%,
        100% {
          opacity: 0.92;
        }
        50% {
          opacity: 1;
        }
      }
    </style>
  </defs>

  <rect x="40" y="40" width="600" height="200" rx="20" fill="#0a0814" />

  <circle
    class="ring"
    cx="170"
    cy="140"
    r="48"
    fill="none"
    stroke="#7c6fff"
    stroke-width="1.4"
    stroke-dasharray="7 5"
    opacity="0.36"
  />

  <g stroke="#7c6fff" stroke-width="2.2" stroke-linecap="round">
    <line x1="170" y1="123" x2="170" y2="96" opacity="0.72">
      <animate attributeName="opacity" values="0.36;0.95;0.36" dur="2.4s" repeatCount="indefinite" />
    </line>
    <line x1="187" y1="152" x2="205" y2="172" opacity="0.42">
      <animate attributeName="opacity" values="0.28;0.82;0.28" dur="2.4s" begin="0.45s" repeatCount="indefinite" />
    </line>
    <line x1="153" y1="152" x2="135" y2="172" opacity="0.42">
      <animate attributeName="opacity" values="0.28;0.82;0.28" dur="2.4s" begin="0.9s" repeatCount="indefinite" />
    </line>
    <line x1="191" y1="128" x2="208" y2="107" opacity="0.54">
      <animate attributeName="opacity" values="0.3;0.9;0.3" dur="2.4s" begin="1.35s" repeatCount="indefinite" />
    </line>
  </g>

  <g filter="url(#softGlow)">
    <circle cx="170" cy="140" r="20" fill="#7c6fff">
      <animate attributeName="r" values="20;22;20" dur="2.6s" repeatCount="indefinite" />
    </circle>
    <circle cx="170" cy="140" r="9" fill="#c4bcff">
      <animate attributeName="opacity" values="0.72;1;0.72" dur="2.6s" repeatCount="indefinite" />
    </circle>
  </g>

  <g fill="#00c9a7">
    <circle cx="170" cy="91" r="10">
      <animate attributeName="r" values="9;11.5;9" dur="2.1s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.72;1;0.72" dur="2.1s" repeatCount="indefinite" />
    </circle>
    <circle cx="209" cy="176" r="10">
      <animate attributeName="r" values="8.5;11;8.5" dur="2.1s" begin="0.45s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.55;1;0.55" dur="2.1s" begin="0.45s" repeatCount="indefinite" />
    </circle>
    <circle cx="131" cy="176" r="10">
      <animate attributeName="r" values="8.5;11;8.5" dur="2.1s" begin="0.9s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.55;1;0.55" dur="2.1s" begin="0.9s" repeatCount="indefinite" />
    </circle>
    <circle cx="212" cy="104" r="7" opacity="0.75">
      <animate attributeName="r" values="6;8.5;6" dur="2.1s" begin="1.35s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.45;0.95;0.45" dur="2.1s" begin="1.35s" repeatCount="indefinite" />
    </circle>
  </g>

  <circle cx="170" cy="125" r="4" fill="#ffffff">
    <animate attributeName="cy" values="123;96;123" dur="1.9s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.25;1;0.25" dur="1.9s" repeatCount="indefinite" />
  </circle>

  <line x1="248" y1="72" x2="248" y2="208" stroke="#2a2550" stroke-width="1.2" stroke-linecap="round" />

  <g class="wordmark">
    <text x="268" y="130" font-family="Georgia, 'Times New Roman', serif" font-size="46" font-weight="700" fill="#f0eeff" letter-spacing="8">
      NEXUS
    </text>
    <text x="271" y="164" font-family="Arial, sans-serif" font-size="15" fill="#8888aa" letter-spacing="5">
      AI  PIPELINE
    </text>
  </g>
</svg>
