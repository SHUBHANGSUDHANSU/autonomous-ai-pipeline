<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="64" height="64" rx="14" fill="#0a0814"/>

  <!-- Outer ring -->
  <circle cx="32" cy="32" r="22" fill="none" stroke="#7c6fff" stroke-width="0.8" opacity="0.2"/>

  <!-- Arms from center to nodes -->
  <line x1="32" y1="20" x2="32"  y2="11" stroke="#7c6fff" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="43" y1="38" x2="51"  y2="50" stroke="#7c6fff" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="21" y1="38" x2="13"  y2="50" stroke="#7c6fff" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="44" y1="25" x2="52"  y2="14" stroke="#7c6fff" stroke-width="2" stroke-linecap="round" opacity="0.5"/>

  <!-- Center node -->
  <circle cx="32" cy="32" r="10" fill="#7c6fff"/>
  <circle cx="32" cy="32" r="4.5" fill="#c4bcff"/>

  <!-- Outer nodes -->
  <circle cx="32"  cy="8"  r="5"   fill="#00c9a7"/>
  <circle cx="54"  cy="52" r="5"   fill="#00c9a7"/>
  <circle cx="10"  cy="52" r="5"   fill="#00c9a7"/>
  <circle cx="55"  cy="11" r="3.5" fill="#00c9a7" opacity="0.65"/>

  <!-- Pulse dot -->
  <circle cx="32" cy="17" r="2.5" fill="#ffffff" opacity="0.85"/>
</svg>
